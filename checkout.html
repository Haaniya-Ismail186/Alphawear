<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ALPHAWEAR</title>
    <link rel="stylesheet" href="cart style.css"> 
    <link rel="stylesheet" href="checkout style.css">
</head>
<body>

    <!-- <nav class="navbar">
        <div class="logo">ALPHAWEAR</div>
    </nav> -->

    <nav class="navbar">
        <div class="logo">ALPHAWEAR</div>
        
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <ul class="nav-links" id="nav-list">
            <li><a href="index.html">Home</a></li>
            <li><a href="shalwar-kameez.html">Shalwar Kameez</a></li>
            <li><a href="hoodies.html">Hoodies</a></li>
            <li><a href="shirts.html">Shirts</a></li>
            <li><a href="tshirts.html">T-Shirts</a></li>
            <li><a href="pants.html">Pants & Trousers</a></li>
            <li><a href="accessories.html">Accessories</a></li>
            <li><a href="cart.html" class="cart-link">Cart</a></li>
            <li><a href="account.html" class="account-btn">Account</a></li>
        </ul>
    </nav>

    <div class="checkout-container">
        <div class="cart-breadcrumb">Home > Cart > Checkout</div>
        
        <div class="checkout-grid">
            <div class="form-section">
                <h2 class="checkout-section-title">Shipping Details</h2>
                <form id="order-form" class="shipping-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" required placeholder="yourname@gmail.com">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" required placeholder="First Name">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" required placeholder="Last Name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" required placeholder="House No, Street, Area">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" required placeholder="Karachi">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="tel" required placeholder="03XXXXXXXXX">
                        </div>
                    </div>

                    <h2 class="checkout-section-title" style="margin-top: 30px;">Payment</h2>
                    <div class="payment-method-box">
                        <input type="radio" checked>
                        <span>Cash on Delivery (COD)</span>
                    </div>

                    <button type="submit" class="btn-place-order">Complete Purchase</button>
                </form>
            </div>

            <div class="order-summary-box">
                <h2 class="checkout-section-title">Order Summary</h2>
                <div id="checkout-items-list">
                    </div>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="final-checkout-total">Rs 0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="checkout.js"></script>
</body>
</html>
