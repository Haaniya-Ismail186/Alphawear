<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - Alpha Collection</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Wahi styling jo login page ki hai */
        .signup-container {
            max-width: 400px;
            margin: 150px auto;
            padding: 30px;
            border: 1px solid #eee;
            text-align: center;
            font-family: sans-serif;
        }
        .signup-container input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-signup { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="signup-container">
        <h2>CREATE ACCOUNT</h2>
        <form id="signupForm">
            <input type="text" id="newName" placeholder="Full Name" required>
            <input type="email" id="newEmail" placeholder="Email Address" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-signup">CREATE ACCOUNT</button>
        </form>
        <div style="margin-top:15px">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('newName').value;
            const email = document.getElementById('newEmail').value;
            
            // User register ho gaya
            localStorage.setItem('alphaUser', JSON.stringify({ name: name, email: email }));
            
            alert("Account Created Successfully!");
            window.location.href = 'index.html';
        };
    </script>
</body>
</html>
